<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">

        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
            <option value="" disabled selected>Choose a Product ...</option>
        </select>

        <div class="rating-group">
            <label>Overall Rating</label>

            <div class="stars">
                <label><span>☆</span><input type="radio" name="rating" value="1" required></label>
                <label><span>☆☆</span><input type="radio" name="rating" value="2"></label>
                <label><span>☆☆☆</span><input type="radio" name="rating" value="3"></label>
                <label><span>☆☆☆☆</span><input type="radio" name="rating" value="4"></label>
                <label><span>☆☆☆☆☆</span><input type="radio" name="rating" value="5"></label>
            </div>
        </div>

        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>

        <div class="features">
            <label>
                Which features did you find useful in the product?
                <br>
                <em>(Check all that apply)</em>
            </label>

            <label><input type="checkbox" name="features" value="Durability"> Durability</label>
            <label><input type="checkbox" name="features" value="Ease of Use"> Ease of Use</label>
            <label><input type="checkbox" name="features" value="Performance"> Performance</label>
            <label><input type="checkbox" name="features" value="Design"> Design</label>
        </div>

        <label for="review">
            Written Review <span class="optional">(Optional)</span>
        </label>
        <textarea id="review" name="review" rows="6"></textarea>

        <label for="username">
            Your Name <span class="optional">(Optional)</span>
        </label>
        <input type="text" id="username" name="username">

        <input type="submit" value="Post Review">

    </form>
</main>

<footer>
    <p>©2026 🌺 Marjorie Omojeminiyi 🌺 Nigeria</p>
</footer>

</body>
</html>
